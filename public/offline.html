<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Blindcall — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050810;color:#f0f2ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
.icon{font-size:3.5rem;margin-bottom:20px;}
h1{font-size:1.4rem;font-weight:700;margin-bottom:10px;}
p{font-size:.9rem;color:#60a5fa;line-height:1.7;max-width:280px;}
.btn{margin-top:24px;padding:13px 28px;background:#2563eb;color:#fff;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="icon">📵</div>
<h1>You're Offline</h1>
<p>Blindcall needs an internet connection to connect you with strangers. Please check your connection and try again.</p>
<button class="btn" onclick="location.reload()">Try Again</button>
</body>
</html>
